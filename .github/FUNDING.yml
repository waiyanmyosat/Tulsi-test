name: Tulsi Custom Build

on:
  push:
    branches: [ "main", "master" ] # Triggers on either branch name
  workflow_dispatch: # Allows you to click "Run" manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Build Debug APK
        # assembleDebug is best because it doesn't require private signing keys
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tulsi-Custom-NoLogo
          path: app/build/outputs/apk/debug/app-debug.apk